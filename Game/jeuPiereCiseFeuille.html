<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
    body{
            background-color: #FBC3C1;
            font-family:'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif  }
        img:hover{
            border-radius: 50px ;
            cursor: pointer;
        }
        button:hover{
            border-radius: 50px ;
            cursor: pointer;
        }
        img , button{
            transition: border-radius 2s ease;
        }
    </style>
</head>
<body>
    <div style="display: flex;flex-direction: column; justify-content: center; top: 100px; text-align: center;">
    <h1 style="font-weight: bold;color: rgb(30, 22, 10)">Jouer  Pierre - Feuille - Ciseaux  !!!</h1>
    <div style="display: flex; justify-content: center;gap: 30px;position: relative;top: 20px;">
    <button><img src="images/Scissors.jpeg" onclick="jouer('ciseau')" width="100px" height="100px" alt=""></button>
    <button><img src="images/paper.jpeg" onclick="jouer('feuille')" width="100px" height="100px" alt=""></button>
    <button><img src="images/rock.jpeg" onclick="jouer('pierre')" width="100px" height="100px" alt=""></button>
    </div>
    <h3 id="ch"  style="font-weight: bold;color: rgb(184, 108, 3) ; position: relative; top: 40px;"></h3>
    <h2 id="res"  style="font-weight: bold;color: rgb(41, 128, 0) ; position: relative; top: 40px;"></h2>
    </div> 
    <script>
                function jouer(choix){
            let t = ["ciseau" , "feuille" , "pierre"];
            let mon = Math.floor(Math.random() * 3);
            let compChoice = t[mon] ;
            if(compChoice === choix){
                ch.innerHTML = "" ;
                res.innerText = "SAME" ;''
            }else if(compChoice === "ciseau" && choix === "feuille"){
                ch.innerHTML = '<img src="images/Scissors.jpeg"  width="100px" height="100px" alt="">'
                res.innerText = "YOU LOOSE" ;
            }else if(compChoice === "ciseau" && choix === "pierre"){
                ch.innerHTML = '<img src="images/Scissors.jpeg"  width="100px" height="100px" alt="">'
                res.innerText = "YOU WON" ;
            }else if(compChoice === "feuille" && choix === "pierre"){
                ch.innerHTML = '<img src="images/paper.jpeg"  width="100px" height="100px" alt="">'
                res.innerText = "YOU LOOSE" ;
            }else if(compChoice === "feuille" && choix === "ciseau"){
                ch.innerHTML = '<img src="images/paper.jpeg"  width="100px" height="100px" alt="">'
                res.innerText = "YOU WON" ;
            }else if(compChoice === "pierre" && choix === "feuille"){
                ch.innerHTML = '<img src="images/rock.jpeg"  width="100px" height="100px" alt="">'
                res.innerText = "YOU WON" ;
            }else if(compChoice === "pierre" && choix === "ciseau"){
                ch.innerHTML = '<img src="images/rock.jpeg"  width="100px" height="100px" alt="">'
                res.innerText = "YOU LOOSE" ;
            }
        }
    </script>
</body>
</html>
